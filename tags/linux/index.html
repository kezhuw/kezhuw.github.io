    <h1 class="title"><a href="/2015/04/25/split-read-write-events-in-epoll/">epoll 的读写分离</a></h1>
  

    </header>
    <div class="entry">
      
        <p>直接上代码，简单明了，无错误处理。</p>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// initialization</span></span><br><span class="line"><span class="keyword">int</span> epfd = epoll_create(<span class="number">1</span>);</span><br><span class="line"><span class="keyword">int</span> readfd = epoll_create(<span class="number">1</span>);</span><br><span class="line"><span class="keyword">int</span> writefd = epoll_create(<span class="number">1</span>);</span><br><span class="line"></span><br><span class="line"><span class="keyword">struct</span> epoll_event event;</span><br><span class="line">event.events = EPOLLIN;</span><br><span class="line"></span><br><span class="line">event.data.fd = readfd;</span><br><span class="line">epoll_ctl(epfd, EPOLL_CTL_ADD, readfd, &amp;event);</span><br><span class="line"></span><br><span class="line">event.data.fd = writefd;</span><br><span class="line">epoll_ctl(epfd, EPOLL_CTL_ADD, writefd, &amp;event);</span><br></pre></td></tr></table></figure>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// wait read event</span></span><br><span class="line"><span class="keyword">struct</span> epoll_event ev;</span><br><span class="line">ev.events = EPOLLIN; <span class="comment">// with possible other flags.</span></span><br><span class="line">ev.data.fd = fd;</span><br><span class="line">epoll_ctl(readfd, EPOLL_CTL_ADD, fd, &amp;ev);</span><br></pre></td></tr></table></figure>
<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// polling</span></span><br><span class="line"><span class="keyword">enum</span> &#123;</span><br><span class="line">    kEventsSize      = <span class="number">512</span>,</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="keyword">struct</span> epoll_event eps[<span class="number">2</span>];</span><br><span class="line"><span class="keyword">struct</span> epoll_event evs[kEventsSize];</span><br><span class="line"></span><br><span class="line"><span class="keyword">int</span> n = epoll_wait(epfd, eps, <span class="number">2</span>, timeout);</span><br><span class="line"><span class="keyword">while</span> (n-- &gt; <span class="number">0</span>) &#123;</span><br><span class="line">    <span class="keyword">int</span> fd = eps[n].data.fd;</span><br><span class="line">    <span class="keyword">int</span> nevent = epoll_wait(fd, events, kEventsSize, <span class="number">0</span>);</span><br><span class="line">    <span class="keyword">if</span> (fd == readfd) &#123;</span><br><span class="line">        <span class="comment">// read events</span></span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">        <span class="comment">// write events</span></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p>推荐阅读: FreeBSD <a href="http://www.freebsd.org/cgi/man.cgi?query=kqueue" target="_blank" rel="external">kqueue(2)</a></p>
